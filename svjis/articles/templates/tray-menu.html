{% load article_filters i18n %}

<div class="tray-nav-wrapper">
    <nav class="tray-nav">
        {% if tray_menu_items %}
        {% for obj in tray_menu_items %}
        <a href="{{ obj.link }}" class="tray-nav__item{% if obj.active %} tray-nav__item--active{% endif %}">{{ obj.description }}</a>
        {% endfor %}
        {% endif %}
        {% if not request.user.is_authenticated %}
        <a href="{% url 'login_page' %}" class="tray-nav__item">{% translate 'Login' %}</a>
        {% endif %}

        <div class="tray-nav__spacer"></div>

        {% if search_endpoint %}
        <form class="tray-search" action="{{ search_endpoint }}" method="get">
            <input class="tray-search__input" type="text" name="search" placeholder="{% translate 'Search' %}" aria-label="{% translate 'Search' %}" />
            <button class="tray-search__btn" type="submit" aria-label="{% translate 'Search' %}">{% icon 'search' %}</button>
        </form>
        {% endif %}
    </nav>
</div>
