{% load article_filters i18n %}
{% get_current_language as LANGUAGE_CODE %}

<!DOCTYPE html>
<html lang="{{ LANGUAGE_CODE }}">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="{{ web_title|default:'SVJIS2' }}" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/static/css/styles_v3.css?v={% static_version 'css/styles_v3.css' %}" />
    <title>{{ web_title|default:"SVJIS2" }}</title>
</head>

<body>
    <div class="app-shell">
        {% include 'header.html' %}
        {% include 'tray-menu.html' %}
        <div class="messages-wrapper">
            {% include 'messages.html' %}
        </div>
        <div class="app-body">
            {% block sitecontent %}
            {% endblock sitecontent %}
        </div>
        {% include 'footer.html' %}
    </div>
    <script>
        document.querySelector(".menu-toggle")?.addEventListener("click", function () {
            this.classList.toggle("active");
            document.querySelector(".tray-nav")?.classList.toggle("active");
        });
    </script>
</body>

</html>
